management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics  # 로컬은 모두 노출
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      cloudwatch:
        enabled: false                        # 로컬에서 CloudWatch 비활성화
      prometheus:
        enabled: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&defaultAuthenticationPlugin=mysql_native_password
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1800000

  batch:
    job:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  task:
    scheduling:
      pool:
        size: 2

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: campaign-group
      auto-offset-reset: earliest

kafka:
  producer:
    buffer-memory: 134217728
    batch-size: 65536
    linger-ms: 20
    compression-type: none
    max-block-ms: 60000

  consumer:
    max-poll-records: 500
    max-poll-interval-ms: 600000
    session-timeout-ms: 45000

slack:
  webhook-url: ""