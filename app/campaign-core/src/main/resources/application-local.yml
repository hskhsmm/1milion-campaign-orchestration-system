management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics  # 로컬은 모두 노출
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      cloudwatch:
        enabled: false                        # 로컬에서 CloudWatch 비활성화
      prometheus:
        enabled: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&defaultAuthenticationPlugin=mysql_native_password
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1800000

  batch:
    job:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  task:
    scheduling:
      pool:
        size: 2

  data:
    redis:
      cluster:
        # 로컬 표준: docker compose up (app 서비스 포함) — IDE 직접 실행 시 cluster redirect가
        # redis-1/2/3 호스트명으로 돌아와 연결 불가. 반드시 compose 안에서 실행할 것.
        # docker-compose.yml의 SPRING_DATA_REDIS_CLUSTER_NODES 환경변수가 이 값을 오버라이드함.
        nodes: localhost:7001,localhost:7002,localhost:7003
        max-redirects: 3

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest

kafka:
  producer:
    buffer-memory: 134217728
    batch-size: 65536
    linger-ms: 20
    compression-type: none
    max-block-ms: 60000

  consumer:
    max-poll-records: 500
    max-poll-interval-ms: 600000
    session-timeout-ms: 45000

slack:
  webhook-url: ""