# Partition 10 profile for local verification
# Usage: SPRING_PROFILES_ACTIVE=local,p10 ./gradlew bootRun

spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1800000

kafka:
  producer:
    buffer-memory: 536870912
    batch-size: 131072
    linger-ms: 5
    compression-type: none
    max-block-ms: 60000

  consumer:
    max-poll-records: 100
    max-poll-interval-ms: 600000
    session-timeout-ms: 45000
