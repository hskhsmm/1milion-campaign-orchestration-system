management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  health:
    kafka:
      enabled: false
  metrics:
    export:
      cloudwatch:
        enabled: true
        namespace: CampaignSystem/V2
        step: 1m
      prometheus:
        enabled: true

spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: true
    admin:
      auto-create: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  task:
    scheduling:
      pool:
        size: 2

  batch:
    job:
      enabled: false

kafka:
  producer:
    buffer-memory: 536870912
    batch-size: 131072
    linger-ms: 5
    compression-type: none
    max-block-ms: 60000
    acks: all
    enable-idempotence: true

  consumer:
    max-poll-records: 100
    max-poll-interval-ms: 600000
    session-timeout-ms: 45000
    replication-factor: 3
    partitions: 10

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}
