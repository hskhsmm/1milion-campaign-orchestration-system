management:
  endpoints:
    web:
      exposure:
        include: health, prometheus        # Prometheus scrape 엔드포인트 노출
  endpoint:
    health:
      show-details: when-authorized        # 인증된 요청만 상세 노출
    prometheus:
      enabled: true
  health:
    kafka:
      enabled: false                       # Actuator Kafka Health 완전 제거
  metrics:
    export:
      cloudwatch:
        enabled: true
        namespace: CampaignSystem/V2       # CloudWatch 콘솔 네임스페이스
        step: 1m                           # 이벤트 중 실시간 감지 (PDF 목적 1번)
      prometheus:
        enabled: true

spring:
  datasource:
    hikari:
      # maximum-pool-size, minimum-idle은 파티션별 프로필(p2, p3 등)에서 설정
      connection-timeout: 20000 # 커넥션 획득 타임아웃 20초
      idle-timeout: 300000      # 유휴 커넥션 유지 시간 5분
      max-lifetime: 1800000     # 커넥션 최대 수명 30분

  jpa:
    hibernate:
      ddl-auto: validate  # 프로덕션에서는 validate 또는 none 권장
    show-sql: false       # 프로덕션에서는 로깅 최소화
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100  # N+1 문제 방지

  # Redis 설정 (프로덕션 - AWS ElastiCache)
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: true        #  Consumer 기동
    admin:
      auto-create: true         # (있어도 되고 없어도 됨)

  flyway:
    baseline-on-migrate: true    # flyway_schema_history 없을 때 자동 baseline 생성
    baseline-version: 0          # V0 베이스라인 → V1부터 전체 실행

  batch:
    job:
      enabled: false             #  Batch 자동 실행 차단

# Kafka 설정 (프로덕션 - 파티션 1개 기준 안정적 설정)
# ⚠️ 프로덕션에서는 실험용 프로필(p2, p3, p5, p10)을 절대 사용하지 마세요!
kafka:
  producer:
    buffer-memory: 134217728    # 128MB
    batch-size: 65536           # 64KB
    linger-ms: 20               # 20ms
    compression-type: none
    max-block-ms: 60000         # 60초

  consumer:
    max-poll-records: 500       # 한 번에 500개씩 처리
    max-poll-interval-ms: 600000  # 10분
    session-timeout-ms: 45000    # 45초
    replication-factor: 3       # 3-broker 클러스터 운영 시 적용
    partitions: 10              # v2 목표 파티션 수

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}