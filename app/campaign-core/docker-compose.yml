services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul # 타임존 설정 (선택하자)
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - campaign-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      # --- KRaft 설정 (Confluent 이미지 전용 변수명) ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

      # --- 리스너 설정 (중요) ---
      # CONTROLLER: 컨트롤러 간 통신 (29093)
      # INTERNAL: 도커 내부 통신 (kafka-ui, app 컨테이너용, 29092)
      # EXTERNAL: 호스트 외부 통신 (로컬 개발용, 9092)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:${KAFKA_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - campaign-net
    healthcheck:
      # Confluent 이미지는 kafka-topics 명령어를 바로 쓸 수 있습니다.
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-1:
    image: redis:7.2-alpine
    container_name: redis-1
    command: >
      redis-server --port 7001 --cluster-enabled yes
      --cluster-config-file /data/nodes.conf --cluster-node-timeout 5000
      --cluster-announce-hostname redis-1 --cluster-announce-port 7001
      --appendonly yes
    ports:
      - "7001:7001"
    volumes:
      - redis_1_data:/data
    networks:
      - campaign-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7001", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-2:
    image: redis:7.2-alpine
    container_name: redis-2
    command: >
      redis-server --port 7002 --cluster-enabled yes
      --cluster-config-file /data/nodes.conf --cluster-node-timeout 5000
      --cluster-announce-hostname redis-2 --cluster-announce-port 7002
      --appendonly yes
    ports:
      - "7002:7002"
    volumes:
      - redis_2_data:/data
    networks:
      - campaign-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7002", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-3:
    image: redis:7.2-alpine
    container_name: redis-3
    command: >
      redis-server --port 7003 --cluster-enabled yes
      --cluster-config-file /data/nodes.conf --cluster-node-timeout 5000
      --cluster-announce-hostname redis-3 --cluster-announce-port 7003
      --appendonly yes
    ports:
      - "7003:7003"
    volumes:
      - redis_3_data:/data
    networks:
      - campaign-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7003", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cluster-init:
    image: redis:7.2-alpine
    container_name: redis-cluster-init
    # 클러스터가 이미 존재하면 create 생략 (idempotent)
    # 볼륨이 남아있는 상태에서 재기동 시 "already initialized" 출력 후 정상 종료
    command: >
      sh -c "
      if redis-cli -h redis-1 -p 7001 cluster info | grep -q 'cluster_state:ok'; then
        echo 'cluster already initialized, skipping'
      else
        redis-cli --cluster create
        redis-1:7001 redis-2:7002 redis-3:7003
        --cluster-replicas 0 --cluster-yes
      fi
      "
    networks:
      - campaign-net
    depends_on:
      redis-1: {condition: service_healthy}
      redis-2: {condition: service_healthy}
      redis-3: {condition: service_healthy}
    restart: on-failure

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      - campaign-net
    depends_on:
      kafka:
        condition: service_healthy

  app:
    build: .
    container_name: campaign-core-app
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_CLUSTER_NODES: redis-1:7001,redis-2:7002,redis-3:7003
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m -XX:MaxDirectMemorySize=128m -Duser.timezone=Asia/Seoul -Dfile.encoding=UTF-8
    ports:
      - "8080:8080"
    networks:
      - campaign-net
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis-cluster-init:
        condition: service_completed_successfully

  # ===== 모니터링 스택 =====

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    ports:
      - "${KAFKA_EXPORTER_PORT:-9308}:9308"
    command:
      - --kafka.server=kafka:29092
    networks:
      - campaign-net
    depends_on:
      kafka:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    environment:
      REDIS_ADDR: redis-1:7001
      REDIS_EXPORTER_IS_CLUSTER: "true"
    networks:
      - campaign-net
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    networks:
      - campaign-net
    depends_on:
      - app
      - kafka-exporter
      - redis-exporter

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - campaign-net
    depends_on:
      - prometheus

networks:
  campaign-net:
    driver: bridge

volumes:
  mysql_data:
  kafka_data:
  redis_1_data:
  redis_2_data:
  redis_3_data:
  prometheus_data:
  grafana_data: